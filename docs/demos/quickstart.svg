<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" role="img" aria-label="Animated terminal recording of aphrodite design">
  <defs>
    <style type="text/css"><![CDATA[
      .term { fill: #0b0b10; }
      .chrome { fill: #1c1c24; }
      .dot1 { fill: #ff5f56; }
      .dot2 { fill: #ffbd2e; }
      .dot3 { fill: #27c93f; }
      .text {
        font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        font-size: 14px;
        fill: #e5e7eb;
      }
      .prompt   { fill: #a78bfa; }
      .ok       { fill: #34d399; }
      .key      { fill: #93c5fd; }
      .value    { fill: #fcd34d; }
      .muted    { fill: #6b7280; }
      .accent   { fill: #f472b6; }

      .line { opacity: 0; }

      @keyframes appear { to { opacity: 1; } }
      @keyframes blink  { 50% { opacity: 0; } }

      /* Staggered reveal — 200 ms steps */
      .l1  { animation: appear 1ms linear 0.1s forwards; }
      .l2  { animation: appear 1ms linear 0.4s forwards; }
      .l3  { animation: appear 1ms linear 1.5s forwards; }
      .l4  { animation: appear 1ms linear 1.9s forwards; }
      .l5  { animation: appear 1ms linear 2.2s forwards; }
      .l6  { animation: appear 1ms linear 2.4s forwards; }
      .l7  { animation: appear 1ms linear 2.6s forwards; }
      .l8  { animation: appear 1ms linear 2.8s forwards; }
      .l9  { animation: appear 1ms linear 3.0s forwards; }
      .l10 { animation: appear 1ms linear 3.3s forwards; }
      .l11 { animation: appear 1ms linear 3.5s forwards; }
      .l12 { animation: appear 1ms linear 3.7s forwards; }
      .l13 { animation: appear 1ms linear 3.9s forwards; }
      .cur { animation: blink 1.0s steps(1) 4.0s infinite; opacity: 1; }
    ]]></style>
  </defs>

  <!-- Window chrome -->
  <rect class="term" x="0" y="0" width="880" height="540" rx="10" />
  <rect class="chrome" x="0" y="0" width="880" height="32" rx="10" />
  <rect class="chrome" x="0" y="20" width="880" height="12" />
  <circle class="dot1" cx="20" cy="16" r="6" />
  <circle class="dot2" cx="40" cy="16" r="6" />
  <circle class="dot3" cx="60" cy="16" r="6" />
  <text class="text muted" x="440" y="20" text-anchor="middle">aphrodite — quickstart</text>

  <!-- Session -->
  <g transform="translate(24, 64)">
    <g class="line l1">
      <text class="text prompt" x="0" y="0">$</text>
      <text class="text" x="18" y="0">aphrodite auth set zai --from-env GLM_API_KEY</text>
    </g>
    <g class="line l2">
      <text class="text muted" x="0" y="24">stored=true  provider=zai</text>
    </g>

    <g class="line l3">
      <text class="text prompt" x="0" y="60">$</text>
      <text class="text" x="18" y="60">aphrodite design <tspan class="value">"A calm editorial landing page for a longevity clinic"</tspan></text>
    </g>

    <g class="line l4">
      <text class="text accent" x="0" y="92">Aphrodite — design</text>
    </g>
    <g class="line l5">
      <text class="text" x="0" y="116">  Provider     : <tspan class="key">zai</tspan>  <tspan class="muted">(glm-4.7)</tspan></text>
    </g>
    <g class="line l6">
      <text class="text" x="0" y="140">  Written      :</text>
    </g>
    <g class="line l7">
      <text class="text muted" x="20" y="160">•</text>
      <text class="text" x="36" y="160">./DESIGN.md</text>
    </g>
    <g class="line l8">
      <text class="text muted" x="20" y="180">•</text>
      <text class="text" x="36" y="180">./hero.html</text>
    </g>
    <g class="line l9">
      <text class="text" x="0" y="204">  Committed    : <tspan class="ok">yes</tspan></text>
    </g>
    <g class="line l10">
      <text class="text" x="0" y="228">  Validation   : <tspan class="ok">PASS</tspan>  <tspan class="muted">(light, dark, brand-a, brand-b · WCAG-AA)</tspan></text>
    </g>
    <g class="line l11">
      <text class="text muted" x="0" y="256">  Open in browser: </text>
      <text class="text key" x="156" y="256" text-decoration="underline">file://./hero.html</text>
    </g>

    <g class="line l12">
      <text class="text prompt" x="0" y="296">$</text>
      <text class="text" x="18" y="296">aphrodite redesign  <tspan class="muted"># implicit "didn't like" signal recorded</tspan></text>
    </g>
    <g class="line l13">
      <text class="text muted" x="0" y="320">→ taste event appended to ~/.aphrodite/taste/&lt;user&gt;.jsonl</text>
      <text class="text muted" x="0" y="340">→ next call biases toward what you actually wanted</text>
    </g>

    <g transform="translate(0, 388)">
      <text class="text prompt" x="0" y="0">$</text>
      <rect class="cur" x="18" y="-12" width="9" height="16" fill="#e5e7eb" />
    </g>
  </g>
</svg>
