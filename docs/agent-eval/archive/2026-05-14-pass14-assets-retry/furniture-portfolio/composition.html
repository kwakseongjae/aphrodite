<!DOCTYPE html>
<html lang="ko" data-variant="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>희양 스튜디오 — Heeyang Studio | Solid Walnut Furniture, Seoul</title>
<style>
  /* ─── Reset ─── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Tokens (light default) ─── */
  :root {
    --colors-primary-50: #f2f0ec;
    --colors-primary-100: #e2ddd6;
    --colors-primary-200: #c4b9a8;
    --colors-primary-400: #8d7b64;
    --colors-primary-500: #6d5e49;
    --colors-primary-600: #574a38;
    --colors-primary-900: #3a3025;
    --colors-neutral-0: #ffffff;
    --colors-neutral-50: #f6f6f5;
    --colors-neutral-100: #ececea;
    --colors-neutral-200: #d5d5d0;
    --colors-neutral-400: #8e8e86;
    --colors-neutral-500: #6d6d64;
    --colors-neutral-700: #3d3d36;
    --colors-neutral-900: #1a1a17;
    --colors-neutral-1000: #000000;
    --colors-accent-50: #f2f0ee;
    --colors-accent-500: #8a7d6d;
    --colors-accent-900: #4a4135;
    --colors-background-primary: #f6f6f5;
    --colors-text-primary: #1a1a17;
    --colors-background-secondary: #ececea;
    --colors-text-secondary: #6d6d64;
    --typography-display-family: 'Source Serif 4', 'Iosevka', 'Georgia', 'Noto Serif KR', serif;
    --typography-body-family: 'Inter', 'Helvetica Neue', 'Noto Sans KR', sans-serif;
    --spacing-0: 0px;
    --spacing-1: 4px;
    --spacing-2: 8px;
    --spacing-3: 12px;
    --spacing-4: 16px;
    --spacing-6: 24px;
    --spacing-8: 32px;
    --spacing-12: 48px;
    --spacing-16: 64px;
    --spacing-24: 96px;
    --spacing-32: 128px;
    --spacing-40: 160px;
    --spacing-56: 224px;
    --rounded-none: 0px;
    --rounded-xs: 2px;
    --rounded-sm: 4px;
    --rounded-md: 6px;
  }

  /* ─── Variants ─── */
  body[data-variant="dark"] {
    --colors-background-primary: #141413;
    --colors-text-primary: #ececea;
    --colors-background-secondary: #1f1f1c;
    --colors-text-secondary: #8e8e86;
  }
  body[data-variant="brand-a"] {
    --colors-background-primary: #f9f8f5;
    --colors-text-primary: #2a2a24;
    --colors-background-secondary: #efede8;
    --colors-text-secondary: #7a7a6e;
  }
  body[data-variant="brand-b"] {
    --colors-background-primary: #242018;
    --colors-text-primary: #ddd9cf;
    --colors-background-secondary: #302b22;
    --colors-text-secondary: #9a9487;
  }

  /* ─── Base ─── */
  html { scroll-behavior: smooth; }
  body {
    background: var(--colors-background-primary);
    color: var(--colors-text-primary);
    font-family: var(--typography-body-family);
    font-weight: 300;
    line-height: 1.6;
    transition: background 0.4s ease, color 0.4s ease;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { opacity: 0.7; }
  a:focus-visible { outline: 2px solid var(--colors-primary-500); outline-offset: 2px; }
  img { display: block; max-width: 100%; }

  /* ─── Navigation ─── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--spacing-8);
    background: var(--colors-background-primary);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease, background 0.4s ease;
  }
  .nav.scrolled { border-bottom-color: var(--colors-neutral-200); }
  .nav__logo {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: 18px;
    letter-spacing: 0.02em;
    color: var(--colors-text-primary);
  }
  .nav__links { display: flex; gap: var(--spacing-8); }
  .nav__links a {
    font-size: 14px; font-weight: 300;
    color: var(--colors-text-secondary);
    transition: color 0.2s ease;
  }
  .nav__links a:hover { color: var(--colors-text-primary); opacity: 1; }

  /* ─── Switcher ─── */
  .switcher {
    display: flex; gap: var(--spacing-2);
    position: fixed; top: 16px; right: 16px; z-index: 200;
  }
  .switcher button {
    background: var(--colors-background-secondary);
    color: var(--colors-text-secondary);
    border: 1px solid var(--colors-neutral-200);
    padding: 6px 14px;
    font-family: var(--typography-body-family);
    font-size: 12px; font-weight: 300;
    cursor: pointer;
    border-radius: var(--rounded-sm);
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .switcher button:hover { background: var(--colors-neutral-400); color: var(--colors-neutral-0); }
  .switcher button.active {
    background: var(--colors-primary-900);
    color: var(--colors-neutral-50);
    border-color: var(--colors-primary-900);
  }

  /* ─── Hero ─── */
  .hero {
    position: relative;
    width: 100%; height: 100vh; min-height: 600px;
    overflow: hidden;
    display: flex; align-items: flex-end;
  }
  .hero__grain-overlay {
    position: absolute; inset: 0;
    background:
      repeating-conic-gradient(var(--colors-neutral-900) 0.0001%, transparent 0.0002%, transparent 0.0004%, var(--colors-neutral-900) 0.0005%) 50% 50% / 200px 200px,
      linear-gradient(to bottom, rgba(242,240,236,0.02), rgba(58,48,37,0.08));
    opacity: 0.45;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .hero__svg { width: 100%; height: 100%; position: absolute; inset: 0; }
  .hero__text {
    position: relative; z-index: 2;
    padding: var(--spacing-8);
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
  }
  .hero__eyebrow {
    font-size: 11px; font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--colors-primary-200);
    margin-bottom: var(--spacing-2);
  }
  .hero__headline {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: clamp(36px, 6vw, 68px);
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--colors-neutral-50);
    max-width: 580px;
  }
  .hero__sub {
    font-weight: 300; font-size: 15px;
    color: rgba(236,234,232,0.65);
    margin-top: var(--spacing-4);
    max-width: 380px;
    line-height: 1.5;
  }

  /* ─── Intro ─── */
  .intro {
    max-width: 1080px; margin: 0 auto;
    padding: var(--spacing-56) var(--spacing-8) var(--spacing-24);
  }
  .intro__text {
    font-family: var(--typography-display-family);
    font-weight: 300;
    font-size: clamp(22px, 3vw, 32px);
    line-height: 1.4;
    max-width: 640px;
    color: var(--colors-text-primary);
  }

  /* ─── Section headings ─── */
  .section-label {
    font-size: 11px; font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--colors-text-secondary);
    margin-bottom: var(--spacing-6);
  }
  .section-title {
    font-family: var(--typography-display-family);
    font-weight: 300;
    font-size: clamp(32px, 4vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--colors-text-primary);
    margin-bottom: var(--spacing-16);
  }

  /* ─── Work Grid ─── */
  .work { max-width: 1080px; margin: 0 auto; padding: 0 var(--spacing-8) var(--spacing-24); }
  .work__grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--spacing-4);
  }
  @media (max-width: 680px) { .work__grid { grid-template-columns: 1fr; } }
  .work__item { position: relative; cursor: pointer; }
  .work__item:nth-child(3n+1) .work__image { aspect-ratio: 3/4; }
  .work__item:nth-child(3n+2) .work__image { aspect-ratio: 1/1; }
  .work__item:nth-child(3n) .work__image { aspect-ratio: 4/3; }
  .work__image {
    width: 100%; position: relative;
    border-radius: var(--rounded-xs);
    overflow: hidden;
    transition: opacity 0.35s ease;
  }
  .work__item:hover .work__image { opacity: 0.82; }
  .work__image svg { width: 100%; height: 100%; display: block; }
  .work__meta {
    padding: var(--spacing-2) 0 0;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .work__name {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: 15px;
    color: var(--colors-text-primary);
  }
  .work__year {
    font-size: 13px; font-weight: 300;
    color: var(--colors-neutral-400);
  }
  .work__category {
    font-size: 11px; font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--colors-text-secondary);
    margin-top: 2px;
  }

  /* ─── Full-bleed interlude ─── */
  .interlude {
    width: 100%;
    padding: var(--spacing-24) var(--spacing-8);
  }
  .interlude__inner {
    max-width: 1080px; margin: 0 auto;
    position: relative;
    border-radius: var(--rounded-xs);
    overflow: hidden;
    aspect-ratio: 21/9;
  }
  .interlude__inner svg { width: 100%; height: 100%; display: block; }
  .interlude__caption {
    max-width: 1080px; margin: var(--spacing-4) auto 0;
    font-size: 13px; font-weight: 300;
    color: var(--colors-text-secondary);
  }

  /* ─── Process ─── */
  .process {
    max-width: 1080px; margin: 0 auto;
    padding: var(--spacing-24) var(--spacing-8);
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-16);
    align-items: start;
  }
  @media (max-width: 680px) { .process { grid-template-columns: 1fr; } }
  .process__image {
    aspect-ratio: 3/4;
    border-radius: var(--rounded-xs);
    overflow: hidden;
  }
  .process__image svg { width: 100%; height: 100%; display: block; }
  .process__content { padding-top: var(--spacing-8); }
  .process__text {
    font-size: 15px; line-height: 1.7;
    color: var(--colors-text-secondary);
    margin-bottom: var(--spacing-6);
  }
  .process__quote {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: 20px;
    line-height: 1.5;
    color: var(--colors-text-primary);
    border-left: 2px solid var(--colors-primary-500);
    padding-left: var(--spacing-6);
    margin: var(--spacing-12) 0;
  }

  /* ─── Materials ─── */
  .materials {
    max-width: 1080px; margin: 0 auto;
    padding: var(--spacing-24) var(--spacing-8);
  }
  .materials__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--spacing-4);
  }
  @media (max-width: 680px) { .materials__grid { grid-template-columns: 1fr; } }
  .materials__swatch {
    aspect-ratio: 1/1;
    border-radius: var(--rounded-xs);
    position: relative; overflow: hidden;
  }
  .materials__swatch svg { width: 100%; height: 100%; display: block; }
  .materials__swatch-label {
    position: absolute; bottom: var(--spacing-3); left: var(--spacing-3);
    font-size: 11px; font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.75);
  }

  /* ─── Contact ─── */
  .contact {
    max-width: 1080px; margin: 0 auto;
    padding: var(--spacing-32) var(--spacing-8) var(--spacing-24);
    border-top: 1px solid var(--colors-neutral-200);
  }
  .contact__grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--spacing-16);
    margin-top: var(--spacing-12);
  }
  @media (max-width: 680px) { .contact__grid { grid-template-columns: 1fr; } }
  .contact__item {
    display: flex; align-items: flex-start; gap: var(--spacing-3);
  }
  .contact__icon { flex-shrink: 0; color: var(--colors-text-secondary); margin-top: 2px; }
  .contact__label {
    font-size: 11px; font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--colors-text-secondary);
    margin-bottom: var(--spacing-1);
  }
  .contact__value {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: 17px;
    color: var(--colors-text-primary);
    line-height: 1.5;
  }
  .contact__note {
    font-size: 13px; font-weight: 300;
    color: var(--colors-text-secondary);
    line-height: 1.6;
    max-width: 420px;
    margin-top: var(--spacing-12);
  }

  /* ─── Footer ─── */
  .footer {
    max-width: 1080px; margin: 0 auto;
    padding: var(--spacing-8);
    padding-top: var(--spacing-16);
    border-top: 1px solid var(--colors-neutral-200);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: var(--spacing-4);
  }
  .footer__left {
    font-family: var(--typography-display-family);
    font-weight: 300; font-size: 14px;
    color: var(--colors-text-secondary);
  }
  .footer__right {
    font-size: 12px; font-weight: 300;
    color: var(--colors-neutral-400);
    display: flex; gap: var(--spacing-6);
  }

  /* ─── Scroll progress ─── */
  .scroll-line {
    position: fixed; top: 64px; left: 0; z-index: 99;
    height: 1px;
    background: var(--colors-primary-500);
    width: 0%;
    transition: width 0.1s linear;
  }
</style>

<!-- Navigation -->

  <a href="#" class="nav__logo">희양 스튜디오</a>
  <div class="nav__links">
    <a href="#work">Work</a>
    <a href="#process">Process</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<nav class="switcher" aria-label="Theme variant switcher">
  <button data-variant="light" class="active">light</button>
