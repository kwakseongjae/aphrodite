  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    border-radius: 12px;
    background: var(--accent);
    color: var(--bg);
    text-decoration: none;
    font-weight: 600;
    transition: transform 160ms ease, filter 160ms ease;
  }
  .cta:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .switcher {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--muted);
    padding: 6px;
    border-radius: 999px;
    z-index: 10;
  }
  .switcher button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--fg);
    font: inherit;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
  }
  .switcher button[aria-pressed="true"] { background: var(--accent); color: var(--bg); }
  @media (max-width: 600px) {
    .wrap { padding: 64px 20px; }

<body data-variant="light">
  <nav class="switcher" aria-label="Variant switcher">
    <button data-set="brand-a" aria-pressed="false">brand-a</button>
    <button data-set="brand-b" aria-pressed="false">brand-b</button>
    <button data-set="dark" aria-pressed="false">dark</button>
    <button data-set="light" aria-pressed="true">light</button>
    </nav>
  <main class="wrap">
    <p class="eyebrow">walnut-seoul-sottsass</p>
    <h1>Portfolio for an independent walnut furniture maker in Seoul.</h1>
    <p class="lede">Portfolio for an independent walnut furniture maker in Seoul — joyful, polemical, alive Every variant of this surface validates against WCAG-AA contrast and the Google Labs DESIGN.md alpha schema.</p>
    <a class="cta" href="#" aria-label="Primary call to action">Get started →</a>
  </main>
  <script>
    document.querySelectorAll('.switcher button').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.dataset.set;
        document.body.dataset.variant = v;
        document.querySelectorAll('.switcher button').forEach(x => {
          x.setAttribute('aria-pressed', x.dataset.set === v ? 'true' : 'false');
        });
      });
    });
  </script>
