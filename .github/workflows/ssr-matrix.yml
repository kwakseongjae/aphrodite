name: ssr-matrix

# Gate 1 of v1.0 roadmap. Every PR runs the SSR test harness in
# tests/ssr/ against the canonical @aphrodite-design/example-banchan
# fixture. Three layers per component: next build / hydration console
# clean / themed-render. PR cannot merge without green. 3 consecutive
# green runs gate the 1.0 release tag.

on:
  pull_request:
    paths:
      - "crates/aphrodite-generator/src/react_export.rs"
      - "tests/ssr/**"
      - ".github/workflows/ssr-matrix.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  ssr-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        framework:
          - name: next
            app_dir: tests/ssr/next-app
            build_cmd: "pnpm build"
            start_cmd: "pnpm start"
            port: 3000
          - name: vite
            app_dir: tests/ssr/vite-app
            build_cmd: "pnpm build"
            start_cmd: "pnpm preview"
            port: 3001
          - name: remix
            app_dir: tests/ssr/remix-app
            build_cmd: "pnpm build"
            start_cmd: "PORT=3002 pnpm start"
            port: 3002
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            tests/ssr/next-app/pnpm-lock.yaml
            tests/ssr/vite-app/pnpm-lock.yaml
            tests/ssr/remix-app/pnpm-lock.yaml
            tests/ssr/playwright/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: install aphrodite CLI
        run: cargo install --path crates/aphrodite-cli --quiet

      - name: prepare fixture
        env:
          # Provide z.ai key via secret. If missing, fall back to a
          # pre-baked fixture committed under tests/ssr/fixtures-baked/.
          APHRODITE_ZAI_API_KEY: ${{ secrets.APHRODITE_ZAI_API_KEY }}
        run: |
          if [[ -z "${APHRODITE_ZAI_API_KEY:-}" ]]; then
            echo "No API key — skipping create, using committed fixture instead"
            mkdir -p tests/ssr/fixtures
            cp -R tests/ssr/fixtures-baked/banchan-react tests/ssr/fixtures/banchan-react
          else
            bash tests/ssr/scripts/prepare-fixture.sh
          fi

      - name: install ${{ matrix.framework.name }} app deps
        working-directory: ${{ matrix.framework.app_dir }}
        run: pnpm install --no-frozen-lockfile

      - name: build ${{ matrix.framework.name }} (layer 1 — must exit 0)
        working-directory: ${{ matrix.framework.app_dir }}
        run: ${{ matrix.framework.build_cmd }}

      - name: start ${{ matrix.framework.name }}
        working-directory: ${{ matrix.framework.app_dir }}
        run: |
          ${{ matrix.framework.start_cmd }} &
          echo $! > .ssr.pid
          # wait for ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:${{ matrix.framework.port }} > /dev/null; then
              echo "${{ matrix.framework.name }} ready on ${{ matrix.framework.port }}"; break
            fi
            sleep 1
          done

      - name: install Playwright
        working-directory: tests/ssr/playwright
        run: |
          pnpm install --no-frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Playwright smoke (layers 2 + 3) on ${{ matrix.framework.name }}
        working-directory: tests/ssr/playwright
        env:
          APH_SSR_SKIP_WEBSERVER: "1"
          APH_SSR_BASE_URL: http://localhost:${{ matrix.framework.port }}
        run: pnpm test

      - name: stop ${{ matrix.framework.name }}
        if: always()
        working-directory: ${{ matrix.framework.app_dir }}
        run: |
          if [[ -f .ssr.pid ]]; then
            kill $(cat .ssr.pid) || true
          fi

      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.framework.name }}
          path: tests/ssr/playwright/playwright-report/
          retention-days: 7
